server:
  port: 8080

spring:
  application:
    name: gateway-service
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        
        - id: student-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/students/**
          filters:
            - StripPrefix=1
        
        - id: enterprise-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/enterprise/**
          filters:
            - StripPrefix=1
        
        - id: job-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/jobs/**
          filters:
            - StripPrefix=1
        
        - id: resume-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/resume/**
          filters:
            - StripPrefix=1
        
        - id: application-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/application/**
          filters:
            - StripPrefix=1
        
        - id: recommendation-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/recommendation/**
          filters:
            - StripPrefix=1
        
        - id: ai-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/ai/**
          filters:
            - StripPrefix=1
        
        - id: notification-service
          uri: http://localhost:8091
          predicates:
            - Path=/api/notification/**
          filters:
            - StripPrefix=1
        
        - id: sms-service
          uri: http://localhost:8089
          predicates:
            - Path=/api/sms/**
          filters:
            - StripPrefix=1
        
        - id: analytics-service
          uri: http://localhost:8090
          predicates:
            - Path=/api/analytics/**
          filters:
            - StripPrefix=1
      
      globalcors:
        cors-configurations:
          '[/**]':
            allowed-origin-patterns: "*"
            allowed-methods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowed-headers: "*"
            allow-credentials: true
            max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: "*"
