server:
  port: 8086
  tomcat:
    uri-encoding: UTF-8
    charset: UTF-8

spring:
  application:
    name: application-service
  http:
    encoding:
      enabled: true
      charset: UTF-8
      force: true
  jackson:
    charset: UTF-8
    default-property-inclusion: non_null
  cloud:
    nacos:
      config:
        import-check:
          enabled: false
      discovery:
        enabled: false
    sentinel:
      enabled: false
      transport:
        dashboard: ''

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/recruitment_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4"
    username: root
    password: 123456

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 6
      timeout: 5000ms

jwt:
  secret: recruitment-platform-secret-key-2024-for-hs512-algorithm-must-be-at-least-512-bits
  expiration: 86400000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.recruitment.common.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "CURRENT_TIMESTAMP"

logging:
  level:
    com.recruitment: DEBUG
