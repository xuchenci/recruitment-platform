server:
  port: 8091

spring:
  application:
    name: notification-service

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    # 不使用nacos，服务独立运行

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/recruitment_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4"
    username: root
    password: 123456
    
  redis:
    host: 127.0.0.1
    port: 6379
    database: 4
    timeout: 5000ms
  
  # RocketMQ 配置
  rocketmq:
    name-server: 127.0.0.1:9876

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "CURRENT_TIMESTAMP"
      logic-not-delete-value: "NULL"

# 阿里云短信配置
aliyun:
  sms:
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:your-access-key-id}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:your-access-key-secret}
    sign-name: 招聘平台
    template-code: SMS_123456789

rocketmq:
  producer:
    group: notification-producer-group
  consumer:
    group: notification-consumer-group

management:
  endpoints:
    web:
      exposure:
        include: "*"
