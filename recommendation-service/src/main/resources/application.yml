server:
  port: 8084

spring:
  application:
    name: recommendation-service

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    # 不使用nacos，服务独立运行

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/recruitment_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4"
    username: root
    password: 123456
    
  redis:
    host: 127.0.0.1
    port: 6379
    database: 3
    timeout: 5000ms
  
  ai:
    openai:
      base-url: https://api.openai.com/v1
      api-key: ${OPENAI_API_KEY:sk-your-api-key}
      chat:
        options:
          model: gpt-3.5-turbo
          temperature: 0.7
    embedding:
      openai:
        base-url: https://api.openai.com/v1
        api-key: ${OPENAI_API_KEY:sk-your-api-key}
        metadata-mode: embedding

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "CURRENT_TIMESTAMP"
      logic-not-delete-value: "NULL"

management:
  endpoints:
    web:
      exposure:
        include: "*"
