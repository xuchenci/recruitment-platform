server:
  port: 8082

spring:
  application:
    name: student-service

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
    sentinel:
      enabled: false
    # 不使用nacos，服务独立运行

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/recruitment_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4"
    username: root
    password: 123456
    
  redis:
    host: 127.0.0.1
    port: 6379
    database: 1
    timeout: 5000ms

jwt:
  secret: recruitment-platform-secret-key-2024-for-hs512-algorithm-must-be-at-least-512-bits
  expiration: 86400000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "CURRENT_TIMESTAMP"
      logic-not-delete-value: "NULL"

management:
  endpoints:
    web:
      exposure:
        include: "*"
