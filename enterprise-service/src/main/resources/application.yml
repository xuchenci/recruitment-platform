server:
  port: 8083

spring:
  application:
    name: enterprise-service

  autoconfigure:
    exclude:
      - com.alibaba.cloud.sentinel.SentinelAutoConfiguration
      - com.alibaba.cloud.sentinel.SentinelWebAutoConfiguration

  cloud:
    nacos:
      discovery:
        enabled: false
      config:
        enabled: false
        import-check:
          enabled: false

  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: "jdbc:mysql://localhost:3306/recruitment_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&connectionCollation=utf8mb4_unicode_ci&characterSetResults=utf8mb4"
    username: root
    password: 123456

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      database: 3
      timeout: 5000ms

jwt:
  secret: recruitment-platform-secret-key-2024-for-hs512-algorithm-must-be-at-least-512-bits
  expiration: 86400000

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.recruitment.common.entity
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    com.recruitment: DEBUG

sentinel:
  log:
    dir: ./logs
